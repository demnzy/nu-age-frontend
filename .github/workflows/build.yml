name: Build Nu Age EXE (Manual Env Mode)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build EXE
    runs-on: windows-latest

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install flet-cli==0.84.0 flet==0.84.0 flet-video==0.84.0 flet-charts==0.84.0 httpx==0.28.1 requests==2.33.1

      - name: Compile the EXE
        run: |
          flet build windows --product "Nu Age" --verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Error "CRITICAL ERROR: Flet compiler crashed! Check verbose logs for Dart/Python errors."
            exit 1
          }

      - name: Rename the EXE file
        run: |
          Get-ChildItem -Path build/windows -Filter *.exe | Rename-Item -NewName "Nu Age.exe"

      - name: Upload Full App Folder
        uses: actions/upload-artifact@v4
        with:
          name: Nu Age App
          path: build/windows/