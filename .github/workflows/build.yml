name: Build Nu Age APK (Manual Env Mode)

on: 
  workflow_dispatch: 

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🚨 FAIL-SAFE 1: Verify the .env file YOU pushed actually exists
      - name: Verify Manual .env File
        run: |
          if [ ! -f .env ]; then
            echo "::error::CRITICAL ERROR: .env file not found in the repository! You said you pushed it, but it isn't here. The build has been aborted to prevent a broken app."
            exit 1
          fi
          echo "✅ .env file detected in repository."

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🚨 FAIL-SAFE 2: Inject your massive 50+ dependency list
      - name: Inject Strict Requirements
        run: |
          cat << 'EOF' > requirements.txt
          altgraph==0.17.5
          annotated-doc==0.0.4
          annotated-types==0.7.0
          anyio==4.13.0
          arrow==1.4.0
          binaryornot==0.4.4
          certifi==2026.2.25
          chardet==5.2.0
          charset-normalizer==3.4.7
          click==8.3.2
          colorama==0.4.6
          cookiecutter==2.7.1
          fastapi==0.136.0
          flet==0.84.0
          flet-charts==0.84.0
          flet-cli==0.84.0
          flet-desktop==0.84.0
          flet-video==0.84.0
          flet-web==0.84.0
          h11==0.16.0
          httpcore==1.0.9
          httptools==0.7.1
          httpx==0.28.1
          idna==3.11
          Jinja2==3.1.6
          markdown-it-py==4.0.0
          MarkupSafe==3.0.3
          mdurl==0.1.2
          msgpack==1.1.2
          oauthlib==3.3.1
          packaging==26.1
          pefile==2024.8.26
          pydantic==2.13.2
          pydantic_core==2.46.2
          Pygments==2.20.0
          pyinstaller==6.20.0
          pyinstaller-hooks-contrib==2026.4
          python-dateutil==2.9.0.post0
          python-dotenv==1.2.2
          python-slugify==8.0.4
          pywin32-ctypes==0.2.3
          PyYAML==6.0.3
          qrcode==8.2
          repath==0.9.0
          requests==2.33.1
          rich==15.0.0
          setuptools==82.0.1
          six==1.17.0
          starlette==1.0.0
          text-unidecode==1.3
          typing-inspection==0.4.2
          typing_extensions==4.15.0
          tzdata==2026.1
          urllib3==2.6.3
          uvicorn==0.44.0
          watchdog==6.0.0
          watchfiles==1.1.1
          websockets==16.0
          EOF
          echo "✅ requirements.txt forcibly locked into server."

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if ! pip install -r requirements.txt; then
            echo "::error::CRITICAL ERROR: Package installation failed! Review the log to see which dependency was rejected."
            exit 1
          fi

      - name: Compile the APK
        run: |
          if ! flet build apk --product "Nu Age" --verbose; then
            echo "::error::CRITICAL ERROR: Flet compiler crashed! Check verbose logs for Dart/Python errors."
            exit 1
          fi

      - name: Rename the APK file
        run: |
          cd build/apk
          mv *.apk "Nu Age.apk"

      - name: Upload APK to Download
        uses: actions/upload-artifact@v4
        with:
          name: Nu Age App
          path: build/apk/Nu Age.apk