name: Build Nu Age APK

# This allows you to trigger the build manually from the GitHub website
on: 
  workflow_dispatch: 

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          # If you have a requirements.txt file, uncomment the line below:
          # pip install -r requirements.txt

      - name: Compile the APK
        run: flet build apk --product "Nu Age"
        
      - name: Rename the APK file
        run: |
          cd build/apk
          mv *.apk "Nu Age.apk"

      - name: Upload APK to Download
        uses: actions/upload-artifact@v4
        with:
          name: Nu-Age-Android-App
          path: build/apk/**/*.apk
          